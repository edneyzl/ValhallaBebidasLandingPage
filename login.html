<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acessar Conta - Valhalla Bebidas</title>
    <link
      rel="shortcut icon"
      href="./img/Marcas/Valhalla.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./CSS/login.css" />
    <link rel="stylesheet" href="./CSS/page-animations.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body data-page="login">
    
    <!-- ═══════════ NAV MOBILE ═══════════ -->
    <nav class="login__nav page-anim-prep">
      <a href="index.html" class="login__nav-logo">
        <img src="./img/Marcas/Valhalla.svg" alt="Valhalla Bebidas" />
      </a>
    
      <!-- Wrapper com position relative para o dropdown -->
      <div class="login__nav-mobile">
        <button type="button" class="login__nav-menu" id="loginMenuBtn" aria-label="Menu">
          <img src="./img/Icons/menu.svg" alt="" />
        </button>
    
        <div class="nav__dropdown nav__dropdown--mobile" id="loginDropMobile">
          <a href="login.html" class="nav__dropdown-item">
            <span class="nav__dropdown-icon">
              <img src="./img/Icons/arrow.svg" alt="" />
            </span>
            <span>Login</span>
          </a>
          <a href="cadastro.html" class="nav__dropdown-item">
            <span class="nav__dropdown-icon">
              <img src="./img/Icons/user.svg" alt="" />
            </span>
            <span>Cadastrar-se</span>
          </a>
        </div>
      </div>
    </nav>

    <div class="login__title_mobile page-anim-prep">
        <div class="login__mobile-icon">
          <img src="./img/Marcas/ValhallaBlack.svg" alt="" />
        </div>
        <h1>Bem vindo(a) de <span>Volta!</span></h1>
        <p>Faça o login para continuar.</p>
      </div>

    <div class="login">
      <!-- ═══════════ BRAND — Painel esquerdo ═══════════ -->
      <div class="login__brand page-anim-prep">
        <!-- Logo + nome -->
        <div class="logo__brand">
          <a href="index.html">
            <img src="./img/Marcas/ValhallaBlack.svg" alt="Valhalla Bebidas" />
          </a>
          <h2>Valhalla Bebidas</h2>
        </div>

        <!-- Mockup -->
        <img
          src="./img/assets/mockupValhalla.png"
          alt="Mockup Valhalla Bebidas"
          class="login__mockup"
        />
      </div>

      <!-- ═══════════ FORM — Painel direito ═══════════ -->
      <div class="login__form-wrapper page-anim-prep">
        <form class="login__form" id="formLogin">
          <!-- Título -->
          <div class="login__title">
            <h1>Bem vindo(a) de <span>Volta!</span></h1>
            <p>Faça o login para continuar.</p>
          </div>

          <!-- Inputs -->
          <div class="login__inputs">
            <label for="email" class="login__input">
              <img src="./img/Icons/Envelope.svg" alt="" />
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Digite seu email"
                autocomplete="email"
                required
              />
            </label>

            <label for="senha" class="login__input">
              <img src="./img/Icons/Lock.svg" alt="" />
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
              />
              <button type="button" class="login__input__toggle" id="toggleSenha" aria-label="Mostrar senha">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-close" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </label>

          </div>

          <!-- Ações -->
          <div class="login__actions">
            <button type="submit" class="login__btn">Acessar conta</button>
            <p class="login__register">
              Não tem uma conta?
              <a href="cadastro.html">Inscreva-se</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="./JS/auth.js"></script>
    <script src="./JS/login.js"></script>
    <script src="./JS/animations.js"></script>

  </body>
</html>
